<script>
function toggleExt(cb) {
  const campos = document.getElementById('campos-ext')
  const bg = document.getElementById('ext-bg')
  const dot = document.getElementById('ext-dot')
  if (cb.checked) {
    campos.style.display = 'block'
    bg.style.background = '#0ea5e9'
    dot.style.transform = 'translateX(22px)'
  } else {
    campos.style.display = 'none'
    bg.style.background = 'rgba(255,255,255,0.1)'
    dot.style.transform = 'translateX(0)'
  }
}
</script>
