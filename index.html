<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soberanía Editorial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 12px 24px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Soberanía Editorial</h1>

    <p>
      Plataforma editorial independiente.
    </p>

    <a href="/blog">
      Entrar
    </a>
  </div>
</body>
</html>
